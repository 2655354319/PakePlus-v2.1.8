<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂点名器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #E6F4FF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        /* 标题样式 */
        .title {
            font-size: 46px;
            font-weight: bold;
            color: #1890FF;
            margin: 15px 0 25px;
            text-align: center;
        }

        /* 中部超大透明展示框 */
        .display-container {
            width: 96%;
            height: 580px;
            background-color: rgba(255, 255, 255, 0.92);
            border: 3px solid #1890FF;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px auto;
            box-shadow: 0 8px 16px rgba(24, 144, 255, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
        }

        /* 抽取过程单行显示样式 */
        .display-text {
            font-size: 90px;
            font-weight: bold;
            color: #1890FF;
            text-align: center;
            line-height: 1.3;
            letter-spacing: 2px;
            display: none;
        }

        /* 抽取结果网格布局（每行最多10个，最多6列） */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(calc(100%/6), 1fr)); /* 最多6列 */
            gap: 15px;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            display: none;
        }

        .result-item {
            background-color: #F0F7FF;
            border: 2px solid #1890FF;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: 600;
            color: #1890FF;
            padding: 10px;
            text-align: center;
            word-break: break-all;
        }

        /* 参数配置区域 */
        .config-container {
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin: 10px auto 20px;
            flex-wrap: wrap;
        }

        .config-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .config-label {
            font-size: 24px;
            color: #333333;
            font-weight: 500;
        }

        .config-input {
            padding: 12px 15px;
            font-size: 22px;
            border: 2px solid #1890FF;
            border-radius: 10px;
            width: 120px;
            outline: none;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .config-input:focus {
            border-color: #40A9FF;
            box-shadow: 0 0 10px rgba(64, 169, 255, 0.5);
        }

        .switch-btn {
            font-size: 24px;
            color: #333333;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .switch-btn input {
            width: 20px;
            height: 20px;
            accent-color: #1890FF;
        }

        /* 底部操作按钮区域（圆角边框包裹） */
        .btn-container {
            width: 92%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 20px auto 30px;
            background-color: #FFFFFF;
            border: 3px solid #1890FF;
            border-radius: 25px;
            padding: 25px;
            flex-wrap: wrap;
            box-shadow: 0 4px 12px rgba(24, 144, 255, 0.12);
        }

        .operation-btn {
            padding: 16px 32px;
            font-size: 24px;
            background-color: #1890FF;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 140px;
        }

        .operation-btn:hover {
            background-color: #40A9FF;
            transform: translateY(-4px);
            box-shadow: 0 6px 12px rgba(64, 169, 255, 0.2);
        }

        .operation-btn:disabled {
            background-color: #91D5FF;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 后台管理弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.55);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #FFFFFF;
            border-radius: 20px;
            padding: 40px;
            width: 85%;
            max-width: 900px;
            max-height: 85vh;
            overflow-y: auto;
            border: 3px solid #1890FF;
            box-shadow: 0 8px 24px rgba(24, 144, 255, 0.2);
        }

        .modal-title {
            font-size: 30px;
            font-weight: bold;
            color: #1890FF;
            margin-bottom: 30px;
            text-align: center;
        }

        .password-input {
            width: 100%;
            padding: 14px;
            font-size: 22px;
            border: 2px solid #1890FF;
            border-radius: 10px;
            margin-bottom: 30px;
            outline: none;
        }

        .password-input:focus {
            border-color: #40A9FF;
            box-shadow: 0 0 10px rgba(64, 169, 255, 0.5);
        }

        .prob-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }

        .prob-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px;
            border-bottom: 2px solid #E6F4FF;
            background-color: #F8FBFF;
            border-radius: 8px;
        }

        .prob-name {
            font-size: 24px;
            color: #333333;
            width: 240px;
            font-weight: 500;
        }

        .prob-input {
            flex: 1;
            padding: 12px;
            font-size: 22px;
            border: 2px solid #1890FF;
            border-radius: 10px;
            outline: none;
            text-align: center;
        }

        .prob-input:focus {
            border-color: #40A9FF;
            box-shadow: 0 0 8px rgba(64, 169, 255, 0.4);
        }

        .modal-btn-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        /* 响应式适配 */
        @media (max-width: 992px) {
            .display-text {
                font-size: 70px;
            }
            .display-container {
                height: 500px;
            }
            .result-item {
                font-size: 24px;
            }
            .operation-btn {
                padding: 14px 28px;
                font-size: 20px;
                min-width: 120px;
            }
            .config-label, .switch-btn {
                font-size: 20px;
            }
            .config-input {
                font-size: 18px;
                width: 100px;
            }
        }

        @media (max-width: 768px) {
            .display-text {
                font-size: 50px;
            }
            .display-container {
                height: 400px;
            }
            .result-grid {
                grid-template-columns: repeat(auto-fill, minmax(calc(100%/3), 1fr)); /* 移动端最多3列 */
            }
            .result-item {
                font-size: 20px;
            }
            .operation-btn {
                padding: 12px 24px;
                font-size: 18px;
                min-width: 100px;
            }
            .title {
                font-size: 36px;
            }
            .modal-content {
                padding: 25px;
            }
            .modal-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 标题 -->
    <div class="title">课堂点名器</div>

    <!-- 中部超大透明展示框 -->
    <div class="display-container">
        <!-- 抽取过程单行显示 -->
        <div class="display-text" id="displayText">请导入名单后开始抽取</div>
        <!-- 抽取结果网格展示（每行最多10个，最多6列） -->
        <div class="result-grid" id="resultGrid"></div>
    </div>

    <!-- 参数配置区域 -->
    <div class="config-container">
        <div class="config-item">
            <label class="config-label">抽取时间(秒)：</label>
            <input type="number" class="config-input" id="drawTime" value="3.5" min="0.5" step="0.5">
        </div>
        <div class="config-item">
            <label class="config-label">抽取人数：</label>
            <input type="number" class="config-input" id="drawCount" value="1" min="1" step="1">
        </div>
        <div class="config-item">
            <label class="switch-btn">
                <input type="checkbox" id="replaceMode"> 抽中放回
            </label>
        </div>
    </div>

    <!-- 底部操作按钮区域 -->
    <div class="btn-container">
        <button class="operation-btn" id="importBtn">导入名单</button>
        <button class="operation-btn" id="startBtn">开始抽取</button>
        <button class="operation-btn" id="stopBtn" disabled>停止抽取</button>
        <button class="operation-btn" id="resetBtn">重置结果</button>
        <button class="operation-btn" id="adminBtn">后台管理</button>
    </div>

    <!-- 后台管理弹窗 -->
    <div class="modal" id="adminModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">后台验证</div>
            <input type="password" class="password-input" id="adminPwd" placeholder="请输入管理员密码">
            <div class="prob-list" id="probList" style="display: none;"></div>
            <div class="modal-btn-group">
                <button class="operation-btn" id="confirmPwdBtn">确认</button>
                <button class="operation-btn" id="saveProbBtn" style="display: none;">保存概率设置</button>
                <button class="operation-btn" id="closeModalBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件导入输入框 -->
    <input type="file" id="fileInput" accept=".txt,.csv,.xlsx,.xls" style="display: none;">

    <script>
        // 核心数据存储
        const data = {
            nameList: [],          // 人员名单
            probabilities: {},     // 抽取概率 {name: prob}
            isDrawing: false,      // 抽取状态
            drawTimer: null,       // 抽取定时器
            drawInterval: null,    // 滚动定时器
            config: {
                drawTime: 3.5,     // 默认抽取时间
                drawCount: 1,      // 默认抽取人数
                replace: false     // 默认不放回
            },
            adminPwd: "15086128049Fyy", // 后台密码
            resultConfig: {
                maxPerRow: 10,     // 每行最多10个名字
                maxColumns: 6      // 最多6列
            }
        };

        // DOM元素获取
        const elements = {
            displayText: document.getElementById('displayText'),
            resultGrid: document.getElementById('resultGrid'),
            drawTime: document.getElementById('drawTime'),
            drawCount: document.getElementById('drawCount'),
            replaceMode: document.getElementById('replaceMode'),
            importBtn: document.getElementById('importBtn'),
            startBtn: document.getElementById('startBtn'),
            stopBtn: document.getElementById('stopBtn'),
            resetBtn: document.getElementById('resetBtn'),
            adminBtn: document.getElementById('adminBtn'),
            adminModal: document.getElementById('adminModal'),
            modalTitle: document.getElementById('modalTitle'),
            adminPwd: document.getElementById('adminPwd'),
            probList: document.getElementById('probList'),
            confirmPwdBtn: document.getElementById('confirmPwdBtn'),
            saveProbBtn: document.getElementById('saveProbBtn'),
            closeModalBtn: document.getElementById('closeModalBtn'),
            fileInput: document.getElementById('fileInput')
        };

        // 初始化：从本地存储加载配置
        function init() {
            const savedProb = localStorage.getItem('callerProbabilities');
            const savedConfig = localStorage.getItem('callerConfig');
            
            if (savedProb) {
                data.probabilities = JSON.parse(savedProb);
            }
            if (savedConfig) {
                data.config = JSON.parse(savedConfig);
                elements.drawTime.value = data.config.drawTime;
                elements.drawCount.value = data.config.drawCount;
                elements.replaceMode.checked = data.config.replace;
            }
            // 默认显示单行文本，隐藏网格
            showDisplayText();
        }

        // 保存配置到本地存储
        function saveConfig() {
            localStorage.setItem('callerProbabilities', JSON.stringify(data.probabilities));
            localStorage.setItem('callerConfig', JSON.stringify(data.config));
        }

        // 切换显示模式：单行文本（抽取过程）
        function showDisplayText(text = '') {
            elements.displayText.style.display = 'block';
            elements.resultGrid.style.display = 'none';
            if (text) elements.displayText.textContent = text;
        }

        // 切换显示模式：网格布局（抽取结果）
        function showResultGrid(names = []) {
            elements.displayText.style.display = 'none';
            elements.resultGrid.style.display = 'grid';
            // 清空网格
            elements.resultGrid.innerHTML = '';
            
            if (names.length === 0) {
                const emptyItem = document.createElement('div');
                emptyItem.className = 'result-item';
                emptyItem.textContent = '暂无抽取结果';
                elements.resultGrid.appendChild(emptyItem);
                return;
            }

            // 按规则生成网格项（每行最多10个，最多6列）
            names.forEach(name => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.textContent = name;
                elements.resultGrid.appendChild(item);
            });
        }

        // 导入名单处理（支持TXT/CSV，Excel需引入SheetJS）
        elements.importBtn.addEventListener('click', () => {
            elements.fileInput.click();
        });

        elements.fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                let textContent = '';
                // 读取文件内容
                if (file.type.includes('text') || file.name.endsWith('.csv') || file.name.endsWith('.txt')) {
                    textContent = await file.text();
                } else {
                    alert('暂不支持该文件格式！推荐使用TXT/CSV格式（每行1个姓名）');
                    return;
                }

                // 解析名单（过滤空行、多余空格）
                data.nameList = textContent.split(/\r?\n/)
                    .map(line => line.trim().replace(/,/g, '')) // 移除CSV的逗号
                    .filter(name => name && name.length > 0);

                if (data.nameList.length === 0) {
                    alert('未识别到有效姓名！请检查名单格式（每行1个姓名）');
                    return;
                }

                // 初始化新导入人员的概率（默认1.0）
                data.nameList.forEach(name => {
                    if (!data.probabilities[name]) {
                        data.probabilities[name] = 1.0;
                    }
                });
                // 清理已删除人员的概率配置
                Object.keys(data.probabilities).forEach(name => {
                    if (!data.nameList.includes(name)) {
                        delete data.probabilities[name];
                    }
                });

                // 保存配置并提示
                saveConfig();
                showDisplayText(`成功导入 ${data.nameList.length} 人名单！`);
                alert(`✅ 成功导入 ${data.nameList.length} 人名单`);

            } catch (error) {
                alert(`❌ 导入失败：${error.message}`);
                console.error('导入错误：', error);
            }

            // 清空文件输入，避免重复导入
            elements.fileInput.value = '';
        });

        // 开始抽取逻辑
        elements.startBtn.addEventListener('click', () => {
            // 验证名单是否存在
            if (data.nameList.length === 0) {
                alert('请先导入人员名单！');
                return;
            }

            // 解析并验证参数
            const drawTime = parseFloat(elements.drawTime.value);
            const drawCount = parseInt(elements.drawCount.value);
            const replaceMode = elements.replaceMode.checked;

            if (isNaN(drawTime) || drawTime < 0.5) {
                alert('抽取时间需≥0.5秒！');
                return;
            }
            if (isNaN(drawCount) || drawCount < 1) {
                alert('抽取人数需≥1！');
                return;
            }
            // 不放回模式下人数不能超过名单总数
            if (!replaceMode && drawCount > data.nameList.length) {
                alert(`不放回模式下，抽取人数不能超过名单总数（${data.nameList.length}人）！`);
                return;
            }

            // 更新配置并保存
            data.config.drawTime = drawTime;
            data.config.drawCount = drawCount;
            data.config.replace = replaceMode;
            saveConfig();

            // 设置抽取状态
            data.isDrawing = true;
            elements.startBtn.disabled = true;
            elements.stopBtn.disabled = false;

            // 开始滚动抽取（透明化过程）
            startRolling();

            // 定时停止并显示结果
            data.drawTimer = setTimeout(() => {
                stopRolling();
                drawFinalResult();
            }, drawTime * 1000);
        });

        // 停止抽取
        elements.stopBtn.addEventListener('click', () => {
            stopRolling();
            clearTimeout(data.drawTimer);
            data.isDrawing = false;
            elements.startBtn.disabled = false;
            elements.stopBtn.disabled = true;
            showDisplayText('抽取已停止');
        });

        // 重置结果
        elements.resetBtn.addEventListener('click', () => {
            stopRolling();
            clearTimeout(data.drawTimer);
            data.isDrawing = false;
            elements.startBtn.disabled = false;
            elements.stopBtn.disabled = true;
            showDisplayText('请导入名单后开始抽取');
        });

        // 开始滚动显示（透明化抽取过程）
        function startRolling() {
            // 70ms刷新一次，滚动更流畅
            data.drawInterval = setInterval(() => {
                const randomName = getRandomNameByProb();
                showDisplayText(randomName);
            }, 70);
        }

        // 停止滚动
        function stopRolling() {
            if (data.drawInterval) {
                clearInterval(data.drawInterval);
                data.drawInterval = null;
            }
        }

        // 按概率加权随机选择姓名
        function getRandomNameByProb(nameList = data.nameList) {
            // 计算总概率
            let totalProb = 0;
            const probArray = [];
            const nameArray = [];

            nameList.forEach(name => {
                const prob = data.probabilities[name] || 1.0;
                totalProb += prob;
                probArray.push(prob);
                nameArray.push(name);
            });

            // 处理空名单/总概率为0的情况
            if (nameArray.length === 0) return '暂无名单';
            if (totalProb <= 0) return nameArray[Math.floor(Math.random() * nameArray.length)];

            // 加权随机选择
            const random = Math.random() * totalProb;
            let currentProb = 0;
            for (let i = 0; i < nameArray.length; i++) {
                currentProb += probArray[i];
                if (random <= currentProb) {
                    return nameArray[i];
                }
            }
            return nameArray[0];
        }

        // 抽取最终结果（网格布局展示，无弹窗）
        function drawFinalResult() {
            const result = [];
            let tempList = [...data.nameList]; // 复制名单用于不放回抽取

            // 按设定人数抽取
            for (let i = 0; i < data.config.drawCount; i++) {
                if (tempList.length === 0) break;

                const selectedName = getRandomNameByProb(tempList);
                result.push(selectedName);

                // 不放回模式下移除已抽中人员
                if (!data.config.replace) {
                    tempList = tempList.filter(name => name !== selectedName);
                }
            }

            // 按网格布局显示结果（每行最多10个，最多6列）
            showResultGrid(result);

            // 重置抽取状态
            data.isDrawing = false;
            elements.startBtn.disabled = false;
            elements.stopBtn.disabled = true;
        }

        // 后台管理弹窗逻辑
        elements.adminBtn.addEventListener('click', () => {
            // 重置弹窗状态
            elements.modalTitle.textContent = '后台验证';
            elements.adminPwd.style.display = 'block';
            elements.probList.style.display = 'none';
            elements.confirmPwdBtn.style.display = 'block';
            elements.saveProbBtn.style.display = 'none';
            elements.adminPwd.value = '';
            // 显示弹窗
            elements.adminModal.style.display = 'flex';
        });

        // 关闭弹窗
        elements.closeModalBtn.addEventListener('click', () => {
            elements.adminModal.style.display = 'none';
        });

        // 点击弹窗外区域关闭
        elements.adminModal.addEventListener('click', (e) => {
            if (e.target === elements.adminModal) {
                elements.adminModal.style.display = 'none';
            }
        });

        // 验证后台密码
        elements.confirmPwdBtn.addEventListener('click', () => {
            const inputPwd = elements.adminPwd.value.trim();
            if (inputPwd !== data.adminPwd) {
                alert('❌ 密码错误！');
                return;
            }

            // 密码正确，切换到概率设置界面
            elements.modalTitle.textContent = '人员抽取概率设置';
            elements.adminPwd.style.display = 'none';
            elements.confirmPwdBtn.style.display = 'none';
            elements.saveProbBtn.style.display = 'block';
            renderProbList();
        });

        // 渲染概率设置列表
        function renderProbList() {
            if (data.nameList.length === 0) {
                elements.probList.innerHTML = `
                    <div style="text-align:center; font-size:24px; color:#666; padding:20px;">
                        暂无人员名单，请先导入！
                    </div>
                `;
                elements.probList.style.display = 'block';
                return;
            }

            // 生成概率配置项
            let probHtml = '';
            data.nameList.forEach(name => {
                const probValue = data.probabilities[name] || 1.0;
                probHtml += `
                    <div class="prob-item">
                        <div class="prob-name">${name}</div>
                        <input 
                            type="number" 
                            class="prob-input" 
                            data-name="${name}" 
                            value="${probValue}" 
                            min="0" 
                            step="0.1"
                        >
                    </div>
                `;
            });
            elements.probList.innerHTML = probHtml;
            elements.probList.style.display = 'block';
        }

        // 保存概率设置
        elements.saveProbBtn.addEventListener('click', () => {
            const probInputs = elements.probList.querySelectorAll('.prob-input');
            let isSuccess = true;

            probInputs.forEach(input => {
                const name = input.dataset.name;
                const probValue = parseFloat(input.value);
                // 验证概率值有效性
                if (isNaN(probValue) || probValue < 0) {
                    alert(`❌ ${name}的概率值无效！请输入≥0的数字`);
                    isSuccess = false;
                    return;
                }
                // 更新概率
                data.probabilities[name] = probValue;
            });

            if (isSuccess) {
                saveConfig();
                alert('✅ 概率设置保存成功！');
                elements.adminModal.style.display = 'none';
            }
        });

        // 初始化应用
        window.onload = init;
