<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂点名器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #E6F4FF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }

        /* 标题样式 */
        .title {
            font-size: 46px;
            font-weight: bold;
            color: #1890FF;
            margin: 15px 0 25px;
            text-align: center;
        }

        /* 中部超大展示方框（进一步放大） */
        .display-container {
            width: 96%;  /* 宽度再放大2% */
            height: 580px; /* 高度再增加60px */
            background-color: #FFFFFF;
            border: 3px solid #1890FF;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0 20px;
            box-shadow: 0 6px 12px rgba(24, 144, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* 中部字号大幅放大 */
        .display-text {
            font-size: 88px;  /* 字号再增大16px */
            font-weight: bold;
            color: #1890FF;
            text-align: center;
            padding: 20px;
            line-height: 1.2;
        }

        /* 参数配置区域 */
        .config-container {
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 10px 0 15px;
            flex-wrap: wrap;
        }

        .config-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-label {
            font-size: 22px;
            color: #333333;
        }

        .config-input {
            padding: 10px 12px;
            font-size: 20px;
            border: 2px solid #1890FF;
            border-radius: 8px;
            width: 110px;
            outline: none;
            text-align: center;
        }

        .config-input:focus {
            border-color: #40A9FF;
            box-shadow: 0 0 8px rgba(64, 169, 255, 0.6);
        }

        .switch-btn {
            font-size: 22px;
            color: #333333;
            cursor: pointer;
        }

        /* 底部操作按钮区域（圆角边框包裹） */
        .btn-container {
            width: 92%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0 10px;
            background-color: #FFFFFF;
            border: 3px solid #1890FF;
            border-radius: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .operation-btn {
            padding: 15px 30px;
            font-size: 22px;
            background-color: #1890FF;
            color: #FFFFFF;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .operation-btn:hover {
            background-color: #40A9FF;
            transform: translateY(-3px);
        }

        .operation-btn:disabled {
            background-color: #91D5FF;
            cursor: not-allowed;
            transform: none;
        }

        /* 后台管理弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #FFFFFF;
            border-radius: 20px;
            padding: 35px;
            width: 85%;
            max-width: 850px;
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid #1890FF;
        }

        .modal-title {
            font-size: 28px;
            font-weight: bold;
            color: #1890FF;
            margin-bottom: 25px;
            text-align: center;
        }

        .password-input {
            width: 100%;
            padding: 12px;
            font-size: 20px;
            border: 2px solid #1890FF;
            border-radius: 8px;
            margin-bottom: 25px;
            outline: none;
        }

        .prob-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 25px 0;
        }

        .prob-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border-bottom: 2px solid #E6F4FF;
        }

        .prob-name {
            font-size: 22px;
            color: #333333;
            width: 220px;
        }

        .prob-input {
            flex: 1;
            padding: 10px;
            font-size: 20px;
            border: 2px solid #1890FF;
            border-radius: 8px;
            outline: none;
            text-align: center;
        }

        .modal-btn-group {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 25px;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .display-text {
                font-size: 60px;
            }
            .display-container {
                height: 400px;
            }
            .operation-btn {
                padding: 12px 25px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- 标题 -->
    <div class="title">课堂点名器</div>

    <!-- 中部超大展示方框 -->
    <div class="display-container">
        <div class="display-text" id="displayText">请导入名单后开始抽取</div>
    </div>

    <!-- 参数配置区域 -->
    <div class="config-container">
        <div class="config-item">
            <label class="config-label">抽取时间(秒)：</label>
            <input type="number" class="config-input" id="drawTime" value="3.5" min="0.5" step="0.5">
        </div>
        <div class="config-item">
            <label class="config-label">抽取人数：</label>
            <input type="number" class="config-input" id="drawCount" value="1" min="1" step="1">
        </div>
        <div class="config-item">
            <label class="switch-btn">
                <input type="checkbox" id="replaceMode"> 抽中放回
            </label>
        </div>
    </div>

    <!-- 底部操作按钮区域 -->
    <div class="btn-container">
        <button class="operation-btn" id="importBtn">导入名单</button>
        <button class="operation-btn" id="startBtn">开始抽取</button>
        <button class="operation-btn" id="stopBtn" disabled>停止抽取</button>
        <button class="operation-btn" id="resetBtn">重置结果</button>
        <button class="operation-btn" id="adminBtn">后台管理</button>
    </div>

    <!-- 后台管理弹窗 -->
    <div class="modal" id="adminModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">后台验证</div>
            <input type="password" class="password-input" id="adminPwd" placeholder="请输入管理员密码">
            <div class="prob-list" id="probList" style="display: none;"></div>
            <div class="modal-btn-group">
                <button class="operation-btn" id="confirmPwdBtn">确认</button>
                <button class="operation-btn" id="saveProbBtn" style="display: none;">保存概率设置</button>
                <button class="operation-btn" id="closeModalBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件导入输入框 -->
    <input type="file" id="fileInput" accept=".txt,.csv,.xlsx,.xls" style="display: none;">

    <script>
        // 核心数据存储
        const data = {
            nameList: [],          // 人员名单
            probabilities: {},     // 抽取概率 {name: prob}
            isDrawing: false,      // 抽取状态
            drawTimer: null,       // 抽取定时器
            drawInterval: null,    // 滚动定时器
            config: {
                drawTime: 3.5,     // 默认抽取时间
                drawCount: 1,      // 默认抽取人数
                replace: false     // 默认不放回
            },
            adminPwd: "15086128049Fyy" // 后台密码
        };

        // DOM元素获取
        const elements = {
            displayText: document.getElementById('displayText'),
            drawTime: document.getElementById('drawTime'),
            drawCount: document.getElementById('drawCount'),
            replaceMode: document.getElementById('replaceMode'),
            importBtn: document.getElementById('importBtn'),
            startBtn: document.getElementById('startBtn'),
            stopBtn: document.getElementById('stopBtn'),
            resetBtn: document.getElementById('resetBtn'),
            adminBtn: document.getElementById('adminBtn'),
            adminModal: document.getElementById('adminModal'),
            modalTitle: document.getElementById('modalTitle'),
            adminPwd: document.getElementById('adminPwd'),
            probList: document.getElementById('probList'),
            confirmPwdBtn: document.getElementById('confirmPwdBtn'),
            saveProbBtn: document.getElementById('saveProbBtn'),
            closeModalBtn: document.getElementById('closeModalBtn'),
            fileInput: document.getElementById('fileInput')
        };

        // 初始化：从本地存储加载配置
        function init() {
            const savedProb = localStorage.getItem('callerProbabilities');
            const savedConfig = localStorage.getItem('callerConfig');
            
            if (savedProb) {
                data.probabilities = JSON.parse(savedProb);
            }
            if (savedConfig) {
                data.config = JSON.parse(savedConfig);
                elements.drawTime.value = data.config.drawTime;
                elements.drawCount.value = data.config.drawCount;
                elements.replaceMode.checked = data.config.replace;
            }
        }

        // 保存配置到本地存储
        function saveConfig() {
            localStorage.setItem('callerProbabilities', JSON.stringify(data.probabilities));
            localStorage.setItem('callerConfig', JSON.stringify(data.config));
        }

        // 导入名单处理
        elements.importBtn.addEventListener('click', () => {
            elements.fileInput.click();
        });

        elements.fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                // 处理不同格式文件
                if (file.name.endsWith('.txt')) {
                    // 处理TXT文件
                    const text = await file.text();
                    data.nameList = text.split('\n')
                        .map(line => line.trim())
                        .filter(name => name);
                } else if (file.name.endsWith('.csv')) {
                    // 处理CSV文件
                    const text = await file.text();
                    data.nameList = text.split('\n')
                        .map(line => line.split(',')[0].trim())
                        .filter(name => name);
                } else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                    alert('Excel文件需引入SheetJS库支持，建议使用TXT/CSV格式！');
                    return;
                } else {
                    alert('不支持的文件格式！请选择TXT/CSV/XLSX文件');
                    return;
                }

                // 初始化新导入人员的概率
                initProbabilities();
                // 保存配置
                saveConfig();
                // 更新显示
                updateDisplay(`成功导入 ${data.nameList.length} 人名单！`);
                alert(`成功导入 ${data.nameList.length} 人名单！`);

            } catch (error) {
                alert(`导入失败：${error.message}`);
                console.error(error);
            }

            // 清空文件输入
            elements.fileInput.value = '';
        });

        // 初始化人员概率（新导入的人员默认概率1.0）
        function initProbabilities() {
            data.nameList.forEach(name => {
                if (!data.probabilities[name]) {
                    data.probabilities[name] = 1.0;
                }
            });
            // 移除已删除人员的概率配置
            Object.keys(data.probabilities).forEach(name => {
                if (!data.nameList.includes(name)) {
                    delete data.probabilities[name];
                }
            });
        }

        // 开始抽取
        elements.startBtn.addEventListener('click', () => {
            // 验证名单
            if (data.nameList.length === 0) {
                alert('请先导入人员名单！');
                return;
            }

            // 更新配置
            data.config.drawTime = parseFloat(elements.drawTime.value);
            data.config.drawCount = parseInt(elements.drawCount.value);
            data.config.replace = elements.replaceMode.checked;

            // 验证参数
            if (isNaN(data.config.drawTime) || data.config.drawTime < 0.5) {
                alert('抽取时间需大于等于0.5秒！');
                return;
            }
            if (isNaN(data.config.drawCount) || data.config.drawCount < 1) {
                alert('抽取人数需大于等于1！');
                return;
            }
            // 验证不放回模式下的人数限制
            if (!data.config.replace && data.config.drawCount > data.nameList.length) {
                alert(`不放回模式下，抽取人数不能超过名单总数（${data.nameList.length}人）！`);
                return;
            }

            // 保存配置
            saveConfig();

            // 设置抽取状态
            data.isDrawing = true;
            elements.startBtn.disabled = true;
            elements.stopBtn.disabled = false;

            // 开始滚动抽取
            startRolling();

            // 设置最终抽取定时器
            data.drawTimer = setTimeout(() => {
                stopRolling();
                drawFinalResult();
            }, data.config.drawTime * 1000);
        });

        // 停止抽取
        elements.stopBtn.addEventListener('click', () => {
            stopRolling();
            clearTimeout(data.drawTimer);
            data.isDrawing = false;
            elements.startBtn.disabled = false;
            elements.stopBtn.disabled = true;
            updateDisplay('抽取已停止');
        });

        // 重置结果
        elements.resetBtn.addEventListener('click', () => {
            stopRolling();
            clearTimeout(data.drawTimer);
            data.isDrawing = false;
            elements.startBtn.disabled = false;
            elements.stopBtn.disabled = true;
            updateDisplay('请导入名单后开始抽取');
        });

        // 开始滚动显示（透明化抽取过程）
        function startRolling() {
            // 每80ms刷新一次，滚动更流畅
            data.drawInterval = setInterval(() => {
                const randomName = getRandomNameByProb();
                updateDisplay(randomName);
            }, 80);
        }

        // 停止滚动
        function stopRolling() {
            if (data.drawInterval) {
                clearInterval(data.drawInterval);
                data.drawInterval = null;
            }
        }

        // 按概率随机选择姓名
        function getRandomNameByProb(nameList = data.nameList) {
            // 计算总概率
            let totalProb = 0;
            const probArray = [];
            const nameArray = [];

            nameList.forEach(name => {
                const prob = data.probabilities[name] || 1.0;
                totalProb += prob;
                probArray.push(prob);
                nameArray.push(name);
            });

            // 随机选择
            const random = Math.random() * totalProb;
            let current = 0;
            for (let i = 0; i < nameArray.length; i++) {
                current += probArray[i];
                if (random <= current) {
                    return nameArray[i];
                }
            }
            return nameArray[0] || '暂无名单';
        }

        // 抽取最终结果（直接弹窗显示名单，无多余文字）
        function drawFinalResult() {
            const result = [];
            let tempList = [...data.nameList];

            for (let i = 0; i < data.config.drawCount; i++) {
                if (tempList.length === 0) break;

                // 按概率抽取
                const selected = getRandomNameByProb(tempList);
                result.push(selected);

                // 不放回则移除
                if (!data.config.replace) {
                    tempList = tempList.filter(name => name !== selected);
                }
            }

            // 直接弹窗显示抽中名单（无任何多余文字）
            if (result.length > 0) {
                alert(result.join('\n'));
                // 中部展示框显示最后一个抽中名字（也可改为清空）
                updateDisplay(result[result.length - 1]);
            } else {
                alert('暂无抽取结果');
                updateDisplay('请导入名单后开始抽取');
            }

            // 重置状态
            data.isDrawing = false;
            elements.startBtn.disabled = false;
            elements.stopBtn.disabled = true;
        }

        // 更新显示文本
        function updateDisplay(text) {
            elements.displayText.textContent = text;
        }

        // 后台管理弹窗
        elements.adminBtn.addEventListener('click', () => {
            // 重置弹窗状态
            elements.modalTitle.textContent = '后台验证';
            elements.adminPwd.style.display = 'block';
            elements.probList.style.display = 'none';
            elements.confirmPwdBtn.style.display = 'block';
            elements.saveProbBtn.style.display = 'none';
            elements.adminPwd.value = '';
            // 显示弹窗
            elements.adminModal.style.display = 'flex';
        });

        // 关闭弹窗
        elements.closeModalBtn.addEventListener('click', () => {
            elements.adminModal.style.display = 'none';
        });

        // 验证后台密码
        elements.confirmPwdBtn.addEventListener('click', () => {
            const inputPwd = elements.adminPwd.value;
            if (inputPwd !== data.adminPwd) {
                alert('密码错误！');
                return;
            }

            // 密码正确，显示概率设置界面
            elements.modalTitle.textContent = '人员抽取概率设置';
            elements.adminPwd.style.display = 'none';
            elements.confirmPwdBtn.style.display = 'none';
            elements.saveProbBtn.style.display = 'block';
            renderProbList();
        });

        // 渲染概率设置列表
        function renderProbList() {
            if (data.nameList.length === 0) {
                elements.probList.innerHTML = '<div style="text-align:center; font-size:22px; color:#666;">暂无人员名单</div>';
                elements.probList.style.display = 'block';
                return;
            }

            let html = '';
            data.nameList.forEach(name => {
                const prob = data.probabilities[name] || 1.0;
                html += `
                    <div class="prob-item">
                        <div class="prob-name">${name}</div>
                        <input type="number" class="prob-input" data-name="${name}" value="${prob}" min="0" step="0.1">
                    </div>
                `;
            });
            elements.probList.innerHTML = html;
            elements.probList.style.display = 'block';
        }

        // 保存概率设置
        elements.saveProbBtn.addEventListener('click', () => {
            const probInputs = elements.probList.querySelectorAll('.prob-input');
            probInputs.forEach(input => {
                const name = input.dataset.name;
                const prob = parseFloat(input.value);
                if (!isNaN(prob) && prob >= 0) {
                    data.probabilities[name] = prob;
                }
            });

            // 保存配置
            saveConfig();
            alert('概率设置保存成功！');
            elements.adminModal.style.display = 'none';
        });

        // 点击弹窗外区域关闭
        elements.adminModal.addEventListener('click', (e) => {
            if (e.target === elements.adminModal) {
                elements.adminModal.style.display = 'none';
            }
        });

        // 初始化
        window.onload = init;
    </script>
</body>
</html>
